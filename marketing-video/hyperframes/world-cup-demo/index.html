<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #050505;
        color: #fff;
        font-family: Arial, Helvetica, sans-serif;
      }

      #root {
        position: relative;
        overflow: hidden;
        isolation: isolate;
      }

      .background,
      .shade,
      .flash {
        position: absolute;
        inset: 0;
      }

      .background {
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
        transform: scale(1.04);
        will-change: transform;
      }

      .shade {
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.14), rgba(0, 0, 0, 0.4)),
          radial-gradient(circle at center, rgba(255, 186, 64, 0.12), transparent 52%);
      }

      .flash {
        z-index: 3;
        background: #fff;
        opacity: 0;
        pointer-events: none;
      }

      .title {
        position: absolute;
        left: 58px;
        right: 58px;
        bottom: 35%;
        z-index: 2;
        margin: 0;
        transform: translateY(-50%);
        color: #fff;
        font-size: 104px;
        font-weight: 900;
        line-height: 0.92;
        letter-spacing: 0;
        text-align: center;
        text-transform: uppercase;
        -webkit-text-stroke: 8px #050505;
        paint-order: stroke fill;
        text-shadow: 0 10px 22px rgba(0, 0, 0, 0.62);
        will-change: opacity, transform;
      }

      .title.country {
        font-size: 118px;
      }

      .title.chorus {
        font-size: 92px;
        line-height: 0.98;
      }

      .title.long {
        font-size: 76px;
        line-height: 1.02;
      }

      .fire {
        color: #ffd36a;
        -webkit-text-stroke-color: #050505;
      }

      .waveform {
        position: absolute;
        left: 54px;
        right: 54px;
        bottom: 52px;
        z-index: 2;
        display: flex;
        height: 42px;
        align-items: flex-end;
        justify-content: center;
        gap: 5px;
        opacity: 0.7;
        pointer-events: none;
      }

      .wave-bar {
        width: 5px;
        min-height: 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.18);
        transform-origin: center bottom;
        will-change: height, opacity;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="world-cup-demo"
      data-start="0"
      data-duration="69"
      data-width="1080"
      data-height="1920"
    >
      <div class="background"></div>
      <div class="shade"></div>
      <div class="flash"></div>
      <h1 class="title">World Cup Fire</h1>
      <div class="waveform" aria-hidden="true"></div>
      <audio
        id="song-audio"
        src="assets/world-cup-fire.mp3"
        data-start="0"
        data-duration="69"
        data-media-start="0"
        data-track-index="1"
        data-volume="1"
      ></audio>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      const scenes = [
        { start: 0, end: 2, image: "intro-01.png", type: "intro" },
        { start: 2, end: 4, image: "intro-02.png", type: "intro" },
        { start: 4, end: 7, image: "intro-03.png", type: "intro" },
        { start: 7, end: 8, image: "intro-04.png", type: "country" },
        { start: 8, end: 9, image: "intro-05.png", type: "country" },
        { start: 9, end: 10, image: "intro-06.png", type: "country" },
        { start: 10, end: 11, image: "intro-07.png", type: "country" },
        { start: 11, end: 12, image: "intro-08.png", type: "country" },
        { start: 12, end: 13, image: "intro-09.png", type: "country" },
        { start: 13.0, end: 13.72, image: "country-01.png", type: "country" },
        { start: 13.72, end: 14.44, image: "country-02.png", type: "country" },
        { start: 14.44, end: 15.17, image: "country-03.png", type: "country" },
        { start: 15.17, end: 15.89, image: "country-04.png", type: "country" },
        { start: 15.89, end: 16.61, image: "country-05.png", type: "country" },
        { start: 16.61, end: 17.33, image: "country-06.png", type: "country" },
        { start: 17.33, end: 18.06, image: "country-07.png", type: "country" },
        { start: 18.06, end: 18.78, image: "country-08.png", type: "country" },
        { start: 18.78, end: 19.5, image: "country-09.png", type: "country" },
        { start: 19.5, end: 20.22, image: "country-10.png", type: "country" },
        { start: 20.22, end: 20.94, image: "country-11.png", type: "country" },
        { start: 20.94, end: 21.67, image: "country-12.png", type: "country" },
        { start: 21.67, end: 22.39, image: "country-13.png", type: "country" },
        { start: 22.39, end: 23.11, image: "country-14.png", type: "country" },
        { start: 23.11, end: 23.83, image: "country-15.png", type: "country" },
        { start: 23.83, end: 24.56, image: "country-16.png", type: "country" },
        { start: 24.56, end: 25.28, image: "country-17.png", type: "country" },
        { start: 25.28, end: 26.0, image: "country-18.png", type: "country" },
        { start: 26, end: 30, image: "scene-01.png", type: "chorus" },
        { start: 30, end: 34, image: "scene-02.png", type: "chorus" },
        { start: 34, end: 39, image: "scene-03.png", type: "chorus" },
        { start: 39, end: 44, image: "scene-04.png", type: "chorus" },
        { start: 44, end: 49, image: "scene-05.png", type: "chorus" },
        { start: 49, end: 54, image: "scene-06.png", type: "chorus" },
        { start: 54, end: 61.5, image: "scene-07.png", type: "chorus" },
        { start: 61.5, end: 69, image: "scene-08.png", type: "chorus" },
      ];

      const lyrics = [
        { start: 0.0, end: 0.4, text: "HA!", mode: "intro" },
        { start: 0.4, end: 1.2, text: "ONE BALL", mode: "intro" },
        { start: 1.2, end: 2.0, text: "ONE DREAM", mode: "intro" },
        { start: 2.0, end: 3.0, text: "ONE WORLD", mode: "intro" },
        { start: 3.0, end: 4.0, text: "ONE TEAM", mode: "intro" },
        { start: 4.0, end: 5.5, text: "WORLD CUP FIRE", mode: "intro" },
        { start: 5.5, end: 7.0, text: "LIGHT IT UP, LET'S GO!", mode: "intro" },
        { start: 7.0, end: 8.0, text: "USA", mode: "country" },
        { start: 8.0, end: 9.0, text: "CANADA", mode: "country" },
        { start: 9.0, end: 10.0, text: "MEXICO", mode: "country" },
        { start: 10.0, end: 11.0, text: "BRAZIL", mode: "country" },
        { start: 11.0, end: 12.0, text: "ARGENTINA", mode: "country" },
        { start: 12.0, end: 13.0, text: "URUGUAY", mode: "country" },
        { start: 13.0, end: 13.72, text: "COLOMBIA", mode: "country" },
        { start: 13.72, end: 14.44, text: "SPAIN", mode: "country" },
        { start: 14.44, end: 15.17, text: "FRANCE", mode: "country" },
        { start: 15.17, end: 15.89, text: "ENGLAND", mode: "country" },
        { start: 15.89, end: 16.61, text: "GERMANY", mode: "country" },
        { start: 16.61, end: 17.33, text: "PORTUGAL", mode: "country" },
        { start: 17.33, end: 18.06, text: "NETHERLANDS", mode: "country" },
        { start: 18.06, end: 18.78, text: "CROATIA", mode: "country" },
        { start: 18.78, end: 19.5, text: "DENMARK", mode: "country" },
        { start: 19.5, end: 20.22, text: "JAPAN", mode: "country" },
        { start: 20.22, end: 20.94, text: "KOREA", mode: "country" },
        { start: 20.94, end: 21.67, text: "AUSTRALIA", mode: "country" },
        { start: 21.67, end: 22.39, text: "IRAN", mode: "country" },
        { start: 22.39, end: 23.11, text: "SAUDI", mode: "country" },
        { start: 23.11, end: 23.83, text: "QATAR", mode: "country" },
        { start: 23.83, end: 24.56, text: "MOROCCO", mode: "country" },
        { start: 24.56, end: 25.28, text: "SENEGAL", mode: "country" },
        { start: 25.28, end: 26.0, text: "GHANA", mode: "country" },
        { start: 26.0, end: 28.0, text: "FLAGS UP!", mode: "chorus" },
        { start: 28.0, end: 30.0, text: "HANDS HIGH!", mode: "chorus" },
        { start: 30.0, end: 32.0, text: "ONE WORLD!", mode: "chorus" },
        { start: 32.0, end: 34.0, text: "ONE NIGHT!", mode: "chorus" },
        { start: 34.0, end: 36.5, text: "OH, HEY-OH, HEY-OH", mode: "chorus" },
        { start: 36.5, end: 39.0, text: "WORLD CUP FIRE", mode: "chorus" },
        { start: 39.0, end: 41.5, text: "OH, HEY-OH, HEY-OH", mode: "chorus" },
        { start: 41.5, end: 44.0, text: "TAKE US HIGHER", mode: "chorus" },
        { start: 44.0, end: 46.5, text: "FLAGS IN THE SKY", mode: "chorus" },
        { start: 46.5, end: 49.0, text: "VOICES ON FIRE", mode: "chorus" },
        { start: 49.0, end: 51.5, text: "OH, HEY-OH, HEY-OH", mode: "chorus" },
        { start: 51.5, end: 54.0, text: "WORLD CUP FIRE", mode: "chorus" },
        { start: 54.0, end: 56.5, text: "PUT YOUR FLAGS UP", mode: "chorus" },
        { start: 56.5, end: 59.0, text: "PUT YOUR FLAGS UP", mode: "chorus" },
        { start: 59.0, end: 61.5, text: "LET THE WHOLE WORLD HEAR THE SOUND", mode: "chorus" },
        { start: 61.5, end: 64.0, text: "PUT YOUR FLAGS UP", mode: "chorus" },
        { start: 64.0, end: 66.5, text: "PUT YOUR FLAGS UP", mode: "chorus" },
        { start: 66.5, end: 69.0, text: "WE DON'T STOP, WE SHAKE THE GROUND", mode: "chorus" },
      ];

      const background = document.querySelector(".background");
      const title = document.querySelector(".title");
      const flash = document.querySelector(".flash");
      const waveform = document.querySelector(".waveform");
      const waveBars = Array.from({ length: 72 }, (_, index) => {
        const bar = document.createElement("i");
        bar.className = "wave-bar";
        bar.dataset.index = String(index);
        waveform.appendChild(bar);
        return bar;
      });

      function currentItem(items, seconds) {
        return (
          items.find((item) => seconds >= item.start && seconds < item.end) ??
          items[items.length - 1]
        );
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function easeOut(value) {
        return 1 - Math.pow(1 - clamp(value, 0, 1), 3);
      }

      function sceneProgress(scene, seconds) {
        return clamp((seconds - scene.start) / (scene.end - scene.start), 0, 1);
      }

      function lyricProgress(lyric, seconds) {
        return clamp((seconds - lyric.start) / (lyric.end - lyric.start), 0, 1);
      }

      function flashOpacity(seconds) {
        const points = [0, 2, 4, 7, 13, 15.17, 17.33, 19.5, 21.67, 23.83, 26, 34, 36.5, 44, 51.5, 61.5, 66.5];
        let value = 0;
        for (const point of points) {
          const duration = point >= 13 && point < 26 ? 0.08 : 0.16;
          const age = seconds - point;
          if (age >= 0 && age <= duration) {
            value = Math.max(value, (1 - age / duration) * (point === 0 ? 0.85 : 0.38));
          }
        }
        return value;
      }

      function backgroundTransform(scene, seconds) {
        const progress = sceneProgress(scene, seconds);
        const isCountry = scene.type === "country";
        const isChorus = scene.type === "chorus";
        let scale = 1.04 + progress * 0.04;
        let x = 0;
        let y = 0;

        if (scene.start >= 4 && scene.start < 7) scale = 1.06 + progress * 0.07;
        if (isCountry) {
          const beat = Math.max(0, 1 - Math.abs(progress - 0.5) / 0.16);
          scale = 1.04 + progress * 0.045 + beat * 0.008;
          x = Math.sin(seconds * 48) * 2.6 * beat;
          y = Math.cos(seconds * 42) * 2.6 * beat;
        }
        if (isChorus) {
          scale = 1.05 + progress * 0.035;
          x = Math.sin(seconds * 1.6) * 4;
          y = Math.cos(seconds * 1.2) * 4;
        }

        return `translate(${x}px, ${y}px) scale(${scale})`;
      }

      function textMotion(lyric, seconds) {
        const progress = lyricProgress(lyric, seconds);
        const enter = easeOut(progress / 0.22);
        const exit = clamp((lyric.end - seconds) / 0.16, 0, 1);
        const visibility = Math.min(enter, exit);
        let x = 0;
        let y = (1 - enter) * 52;
        let scale = 0.82 + enter * 0.18;

        if (lyric.text === "HA!") {
          scale = 0.65 + enter * 0.62 + Math.sin(progress * Math.PI * 2) * 0.05;
          y = 0;
        } else if (lyric.text === "ONE WORLD") {
          x = (1 - enter) * -180;
          y = 0;
        } else if (lyric.text === "ONE TEAM") {
          x = (1 - enter) * 180;
          y = 0;
        } else if (lyric.text === "WORLD CUP FIRE") {
          scale = 0.72 + enter * 0.34 + Math.max(0, 1 - Math.abs(progress - 0.52) / 0.16) * 0.08;
          y = 0;
        } else if (lyric.mode === "country") {
          const midPulse = Math.max(0, 1 - Math.abs(progress - 0.5) / 0.18);
          scale = 0.72 + enter * 0.32 + midPulse * 0.07;
          x = Math.sin(seconds * 45) * midPulse * 3;
          y = Math.cos(seconds * 38) * midPulse * 3;
        } else if (lyric.mode === "chorus") {
          const pulse = Math.max(0, 1 - Math.abs((progress % 0.5) - 0.12) / 0.12);
          scale = 0.86 + enter * 0.14 + pulse * 0.03;
          y = (1 - enter) * 34;
        }

        return {
          opacity: visibility,
          transform: `translate(${x}px, calc(-50% + ${y}px)) scale(${scale})`,
        };
      }

      function renderWaveform(seconds) {
        const energy = seconds < 7 ? 0.58 : seconds < 26 ? 0.92 : 0.78;
        const beat =
          Math.max(0, 1 - Math.abs((seconds % 1) - 0.18) / 0.18) * (seconds < 26 ? 0.34 : 0.18) +
          Math.max(0, 1 - Math.abs((seconds % 2) - 0.22) / 0.22) * (seconds >= 26 ? 0.24 : 0);

        waveBars.forEach((bar, index) => {
          const phase = index * 0.47 + seconds * (seconds < 26 ? 12.5 : 9.5);
          const wave =
            Math.sin(phase) * 0.5 +
            Math.sin(phase * 0.57 + 1.4) * 0.32 +
            Math.sin(phase * 1.31) * 0.18;
          const centerShape = 0.48 + 0.52 * Math.sin(((index + 1) / waveBars.length) * Math.PI);
          const normalized = Math.max(0.08, (wave + 1) / 2);
          const height = 5 + normalized * centerShape * (18 + energy * 16 + beat * 20);
          bar.style.height = `${height}px`;
          bar.style.opacity = String(0.28 + normalized * 0.48);
        });
      }

      function renderAt(seconds) {
        const scene = currentItem(scenes, seconds);
        const lyric = currentItem(lyrics, seconds);
        background.style.backgroundImage = `url("assets/render/${scene.image}")`;
        title.innerHTML =
          lyric.text === "WORLD CUP FIRE"
            ? 'WORLD CUP<br><span class="fire">FIRE</span>'
            : lyric.text;
        title.classList.toggle("country", lyric.mode === "country");
        title.classList.toggle("chorus", lyric.mode === "chorus");
        title.classList.toggle("long", lyric.text.length >= 24);
        background.style.transform = backgroundTransform(scene, seconds);

        const motion = textMotion(lyric, seconds);
        title.style.opacity = String(motion.opacity);
        title.style.transform = motion.transform;

        flash.style.opacity = String(flashOpacity(seconds));
        renderWaveform(seconds);
      }

      window.addEventListener("hf-seek", (event) => {
        renderAt(event.detail.time);
      });

      renderAt(0);
      window.__timelines = window.__timelines || {};
      window.__timelines["world-cup-demo"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
